# See https://github.com/Roave/BackwardCompatibilityCheck

name: "Backwards Compatibility Check"

on:
    pull_request: ~

jobs:
    backwards-compatibility-check:
        name: "Backwards Compatibility Check"

        runs-on: "ubuntu-latest"

        # Set explicitly so the global config written below is the same home the roave tool's internal
        # composer reads when it installs the baseline/current dependencies.
        env:
            COMPOSER_HOME: "/home/runner/.composer"

        steps:
            -   name: "Checkout"
                uses: "actions/checkout@v4"
                with:
                    fetch-depth: 0

            -   name: "Setup PHP, with composer and extensions"
                uses: "shivammathur/setup-php@v2"
                with:
                    php-version: "8.1"
                    coverage: "none"

            # Sylius 1.x pins api-platform/core to the unmaintained 2.7 line, which has advisories with no
            # 2.x fix. composer >=2.10 refuses to install advisory-affected packages, so the baseline (master)
            # install would fail; disable the block for this throwaway analysis environment.
            -   name: "Disable composer advisory blocking"
                run: "composer global config policy.advisories.block false"

            -   name: "Install tool"
                run: "composer global require roave/backward-compatibility-check"

            -   name: "Check for BC breaks"
                run: "~/.composer/vendor/bin/roave-backward-compatibility-check --from=origin/${{ github.event.pull_request.base.ref }} --format=github-actions"
